apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradingsystem-auth
  namespace: trading-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tradingsystem-auth
  template:
    metadata:
      labels:
        app: tradingsystem-auth
    spec:
      containers:
        - name: auth
          image: tradingsystem-auth:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: trading-system-secrets
                  key: db-connection
            - name: Redis__Configuration
              valueFrom:
                configMapKeyRef:
                  name: trading-system-config
                  key: redis-configuration
            - name: Redis__InstanceName
              valueFrom:
                configMapKeyRef:
                  name: trading-system-config
                  key: redis-instance-name
            - name: Authentication__Issuer
              valueFrom:
                configMapKeyRef:
                  name: trading-system-config
                  key: auth-issuer
            - name: Authentication__Audience
              valueFrom:
                configMapKeyRef:
                  name: trading-system-config
                  key: auth-audience
            - name: Authentication__SigningKey
              valueFrom:
                secretKeyRef:
                  name: trading-system-secrets
                  key: auth-signing-key
            - name: Authentication__SessionMinutes
              valueFrom:
                configMapKeyRef:
                  name: trading-system-config
                  key: auth-session-minutes
            - name: Authentication__BootstrapAdminPassword
              valueFrom:
                secretKeyRef:
                  name: trading-system-secrets
                  key: auth-bootstrap-admin-password
          readinessProbe:
            httpGet:
              path: /swagger/index.html
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: tradingsystem-auth
  namespace: trading-system
spec:
  type: NodePort
  selector:
    app: tradingsystem-auth
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081
