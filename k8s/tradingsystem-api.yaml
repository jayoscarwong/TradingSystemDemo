apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradingsystem-api
  namespace: trading-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tradingsystem-api
  template:
    metadata:
      labels:
        app: tradingsystem-api
    spec:
      containers:
        - name: api
          image: tradingsystem-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: trading-system-secrets
                  key: db-connection
            - name: Redis__Configuration
              valueFrom:
                configMapKeyRef:
                  name: trading-system-config
                  key: redis-configuration
            - name: Redis__InstanceName
              valueFrom:
                configMapKeyRef:
                  name: trading-system-config
                  key: redis-instance-name
            - name: RabbitMQ__Host
              valueFrom:
                configMapKeyRef:
                  name: trading-system-config
                  key: rabbitmq-host
            - name: RabbitMQ__Username
              valueFrom:
                configMapKeyRef:
                  name: trading-system-config
                  key: rabbitmq-username
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: trading-system-secrets
                  key: rabbitmq-password
            - name: Authentication__Issuer
              valueFrom:
                configMapKeyRef:
                  name: trading-system-config
                  key: auth-issuer
            - name: Authentication__Audience
              valueFrom:
                configMapKeyRef:
                  name: trading-system-config
                  key: auth-audience
            - name: Authentication__SigningKey
              valueFrom:
                secretKeyRef:
                  name: trading-system-secrets
                  key: auth-signing-key
            - name: Authentication__SessionMinutes
              valueFrom:
                configMapKeyRef:
                  name: trading-system-config
                  key: auth-session-minutes
          readinessProbe:
            httpGet:
              path: /swagger/index.html
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: tradingsystem-api
  namespace: trading-system
spec:
  type: NodePort
  selector:
    app: tradingsystem-api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
