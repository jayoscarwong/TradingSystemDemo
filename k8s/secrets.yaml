apiVersion: v1
kind: Secret
metadata:
  name: trading-system-secrets
  namespace: trading-system
type: Opaque
stringData:
  db-connection: Server=tradingsystem-mysql;Database=tradingsystem;User=root;Password=rootpassword;
  rabbitmq-password: guest
  rabbitmq-host-uri: amqp://guest:guest@tradingsystem-rabbitmq.trading-system.svc.cluster.local:5672/
  auth-signing-key: ChangeThisToALongerDevelopmentSigningKey1234567890
  auth-bootstrap-admin-password: Admin123!ChangeMe
