apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tradingsystem-api
  namespace: trading-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tradingsystem-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
